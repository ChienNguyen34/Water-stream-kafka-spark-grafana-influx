# docker-compose.cloud.yml — Dành cho EC2 (Option A)
# Chỉ chạy: Kafka + InfluxDB + Grafana
# Spark và Generator vẫn chạy LOCAL, kết nối vào EC2 qua public IP
#
# Cách dùng:
#   1. Sửa EC2_PUBLIC_IP bên dưới (hoặc export biến môi trường)
#   2. Upload file này lên EC2:
#        scp -i your-key.pem docker-compose.cloud.yml ubuntu@<EC2_IP>:~/
#        scp -i your-key.pem -r grafana/ ubuntu@<EC2_IP>:~/
#   3. SSH vào EC2 rồi chạy:
#        docker compose -f docker-compose.cloud.yml up -d

services:

  kafka:
    image: confluentinc/cp-kafka:8.1.2
    container_name: kafka
    mem_limit: 350m
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"  # giới hạn JVM heap
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      # ↓↓ THAY <EC2_PUBLIC_IP> bằng IP thật của EC2 instance ↓↓
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${EC2_PUBLIC_IP}:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  influxdb:
    image: influxdb:2
    container_name: influxdb
    mem_limit: 256m
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: bigdata
      DOCKER_INFLUXDB_INIT_BUCKET: water_bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    mem_limit: 128m
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: adminpassword
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards

volumes:
  kafka_data:
  influxdb_data:
  grafana_data:
