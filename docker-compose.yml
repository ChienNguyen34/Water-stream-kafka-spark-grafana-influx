services:

  kafka:
    image: confluentinc/cp-kafka:8.1.2
    container_name: kafka
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  influxdb:
    image: influxdb:2
    container_name: influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: bigdata
      DOCKER_INFLUXDB_INIT_BUCKET: water_bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: adminpassword
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards

  spark-master:
    build:
      context: .
      dockerfile: spark_streaming/Dockerfile
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8090
    ports:
      - "7077:7077"
      - "8090:8090"
    volumes:
      - ./spark_streaming:/opt/spark-apps

  spark-worker:
    build:
      context: .
      dockerfile: spark_streaming/Dockerfile
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    volumes:
      - ./spark_streaming:/opt/spark-apps

  spark-worker-2:
    build:
      context: .
      dockerfile: spark_streaming/Dockerfile
    container_name: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    volumes:
      - ./spark_streaming:/opt/spark-apps

  spark-driver:
    build:
      context: .
      dockerfile: spark_streaming/Dockerfile
    container_name: spark-driver
    depends_on:
      spark-master:
        condition: service_started
      spark-worker:
        condition: service_started
      spark-worker-2:
        condition: service_started
    environment:
      - KAFKA_BROKER=18.138.224.73:9092
      - KAFKA_TOPIC=water_stream
      - INFLUX_URL=http://18.138.224.73:8086
      - INFLUX_TOKEN=my-super-secret-token
      - INFLUX_ORG=bigdata
      - INFLUX_BUCKET=water_bucket
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.8
      --conf spark.jars.ivy=/tmp/.ivy2
      /opt/spark-apps/stream_processor.py
    volumes:
      - ./spark_streaming:/opt/spark-apps
      - spark_checkpoint:/tmp/spark-checkpoint
      - ivy_cache:/tmp/.ivy2
    restart: on-failure

  generator:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: generator
    environment:
      KAFKA_BROKER: 18.138.224.73:9092
      KAFKA_TOPIC: water_stream
      COMPRESSION_FACTOR: "180000"
    restart: on-failure

volumes:
  kafka_data:
  influxdb_data:
  grafana_data:
  spark_checkpoint:
  ivy_cache:
